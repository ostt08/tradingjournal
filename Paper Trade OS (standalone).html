document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:38px;border-radius:10px;background:var(--lime);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:800;font-size:19px;color:#0a0b0d\">P<\u002Fdiv>\n      <div>\n        <div style=\"font-family:var(--disp);font-weight:800;font-size:21px;letter-spacing:-.01em;line-height:1\">PAPER TRADE OS<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--tx2);letter-spacing:.14em;text-transform:uppercase;margin-top:3px\">Human-in-the-loop · dual-broker paper<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <div style=\"display:flex;align-items:center;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px\">\n        <div style=\"display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:6px;background:var(--lime);color:#0a0b0d;font-size:11px;font-weight:700;letter-spacing:.06em\">● PAPER<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;color:#565d67;font-size:11px;font-weight:600;letter-spacing:.06em\" title=\"Locked. Real-money trading is disabled in this build.\">🔒 LIVE<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:7px;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:8px 12px\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:{{ relayDot }}\"><\u002Fspan>\n        <span style=\"font-size:11px;color:var(--tx2)\">{{ relayStatusText }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PAPER LOCK BANNER -->\n  <div style=\"display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,rgba(232,255,71,.08),rgba(232,255,71,0));border:1px solid rgba(232,255,71,.22);border-radius:12px;padding:11px 16px;margin-bottom:18px\">\n    <span style=\"font-size:16px\">🔒<\u002Fspan>\n    <span style=\"font-size:12px;color:var(--tx);line-height:1.5\">No real money, no webhooks. Signals come from your Claude agents or manual entry. On <b style=\"color:var(--lime)\">your<\u002Fb> approval the router sends each order by asset class — forex → OANDA Demo, stocks &amp; crypto → Alpaca Paper — and a 5-min poller logs fills + P&amp;L to Google Sheets.<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- NAV -->\n  <div style=\"display:flex;gap:3px;background:var(--inset);border:1px solid var(--line);padding:4px;border-radius:12px;margin-bottom:22px;overflow-x:auto\">\n    <button onclick=\"{{ setMoney }}\" style=\"{{ navMoney }}\">Money model<\u002Fbutton>\n    <button onclick=\"{{ setJournal }}\" style=\"{{ navJournal }}\">Journal<\u002Fbutton>\n    <button onclick=\"{{ setAgents }}\" style=\"{{ navAgents }}\">{{ agentsLabel }}<\u002Fbutton>\n    <button onclick=\"{{ setSent }}\" style=\"{{ navSent }}\">Sentiment<\u002Fbutton>\n    <button onclick=\"{{ setConn }}\" style=\"{{ navConn }}\">Connections<\u002Fbutton>\n    <button onclick=\"{{ setLab }}\" style=\"{{ navLab }}\">Lab<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ============ MONEY MODEL ============ -->\n  <div style=\"{{ tabMoneyS }}\">\n    <div style=\"display:flex;gap:5px;margin-bottom:16px\">\n      <button onclick=\"{{ setLatam }}\" style=\"{{ ltLatam }}\">🌎 LATAM<\u002Fbutton>\n      <button onclick=\"{{ setBcn }}\" style=\"{{ ltBcn }}\">🇪🇸 Barcelona<\u002Fbutton>\n      <button onclick=\"{{ setUsa }}\" style=\"{{ ltUsa }}\">🇺🇸 USA<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px\">\n      <div>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;text-align:center;margin-bottom:10px\">\n          <span style=\"font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:10px\">Required account size<\u002Fspan>\n          <div style=\"font-family:var(--disp);font-weight:800;font-size:34 <\u002Fth>\n            <th style=\"text-align:left;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);padding:9px 8px;border-bottom:1px solid var(--line);font-weight:500\">Ticker<\u002Fth>\n            <th style=\"text-align:left;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);padding:9px 8px;border-bottom:1px solid var(--line);font-weight:500\">Dir<\u002Fth>\n            <th style=\"text-align:left;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);padding:9px 8px;border-bottom:1px solid var(--line);font-weight:500\">Entry<\u002Fth>\n            <th style=\"text-align:left;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);padding:9px 8px;border-bottom:1px solid var(--line);font-weight:500\">R:R<\u002Fth>\n            <th style=\"text-align:left;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);padding:9px 8px;border-bottom:1px solid var(--line);font-weight:500\">Routed to<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr>\n                <td style=\"padding:9px 8px;border-bottom:1px solid var(--line);color:var(--tx2);font-size:11px\">{{ s.ts }}<\u002Ftd>\n                <td style=\"padding:9px 8px;border-bottom:1px solid var(--line);font-weight:600\">{{ s.pair }}<\u002Ftd>\n                <td style=\"padding:9px 8px;border-bottom:1px solid var(--line)\"><span style=\"{{ s.dirStyle }}\">{{ s.direction }}<\u002Fspan><\u002Ftd>\n                <td style=\"padding:9px 8px;border-bottom:1px solid var(--line);font-size:11px\">{{ s.entry }}<\u002Ftd>\n                <td style=\"padding:9px 8px;border-bottom:1px solid var(--line);font-size:11px;color:var(--grn)\">{{ s.rrText }}<\u002Ftd>\n                <td style=\"padding:9px 8px;border-bottom:1px solid var(--line);font-size:11px;color:var(--tx2)\">{{ s.routed }}<\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ SENTIMENT ============ -->\n  <div style=\"{{ tabSentS }}\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px\">\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px\">\n        <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:12px\">Analyze market sentiment<\u002Fspan>\n        <div style=\"margin-bottom:10px\"><span style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:5px\">Asset / pair / keyword<\u002Fspan><input type=\"text\" ref=\"{{ refSAsset }}\" placeholder=\"EUR/USD, Bitcoin, DXY...\" style=\"width:100%;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:8px 10px;color:var(--tx);font-size:13px\"><\u002Fdiv>\n        <div style=\"margin-bottom:12px\"><span style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:5px\">Paste headlines or describe context<\u002Fspan><textarea ref=\"{{ refSCtx }}\" rows=\"5\" placeholder=\"Paste news headlines, or describe what you see in the market...\" style=\"width:100%;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:8px 10px;color:var(--tx);font-size:13px;resize:vertical\"><\u002Ftextarea><\u002Fdiv>\n        <button onclick=\"{{ doSent }}\" style=\"width:100%;padding:10px;border-radius:9px;border:none;background:var(--lime);color:#0a0b0d;font-size:13px;font-weight:700;cursor:pointer\">{{ sentBtn }}<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;text-align:center\">\n        <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:10px\">Heat score<\u002Fspan>\n        <div style=\"font-family:var(--disp);font-weight:800;font-size:54px;line-height:1;color:{{ heatColor }}\">{{ heatNum }}<\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-top:6px;color:{{ heatColor }}\">{{ heatLbl }}<\u002Fdiv>\n        <div style=\"position:relative;height:8px;border-radius:4px;background:linear-gradient(90deg,#ff5d78 0%,#ffb830 50%,#3dffa0 100%);margin:16px 0 6px\">\n          <div style=\"position:absolute;top:-5px;width:4px;height:18px;background:var(--tx);border-radius:2px;transform:translateX(-50%);transition:left .5s ease;left:{{ needleLeft }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:10px;color:var(--tx2)\"><span>fear<\u002Fspan><span>neutral<\u002Fspan><span>greed<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px\">\n        <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:10px\">Key drivers<\u002Fspan>\n        <sc-if value=\"{{ hasSent }}\" hint-placeholder-val=\"{{ false }}\">\n          <sc-for list=\"{{ drivers }}\" as=\"d\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px\"><span style=\"color:{{ d.color }}\">{{ d.sym }}<\u002Fspan><span style=\"color:var(--tx2)\">{{ d.text }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ hasRec }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:11px;padding:9px 12px;background:var(--inset);border-radius:9px;font-size:11.5px;color:var(--tx);line-height:1.5\">→ {{ rec }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"color:var(--tx2);font-size:12px\">Run an analysis to see bullish and bearish drivers.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px\">\n        <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:10px\">History<\u002Fspan>\n        <sc-if value=\"{{ hasHist }}\" hint-placeholder-val=\"{{ false }}\">\n          <sc-for list=\"{{ sentHist }}\" as=\"h\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;gap:11px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)\">\n              <span style=\"font-family:var(--disp);font-weight:700;font-size:17px;color:{{ h.color }};min-width:30px\">{{ h.score }}<\u002Fspan>\n              <div><div style=\"font-size:12px;font-weight:600\">{{ h.asset }}<\u002Fdiv><div style=\"font-size:10px;color:var(--tx2)\">{{ h.ts }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noHist }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"color:var(--tx2);font-size:12px\">Previous scans appear here.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ CONNECTIONS ============ -->\n  <div style=\"{{ tabConnS }}\">\n    <!-- architecture -->\n    <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px\">\n      <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:14px\">Architecture · zero-cost · no webhooks · paper only<\u002Fspan>\n      <div style=\"display:flex;align-items:stretch;gap:8px;flex-wrap:wrap\">\n        <div style=\"flex:1;min-width:118px;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center\"><div style=\"font-size:18px\">🤖<\u002Fdiv><div style=\"font-size:11px;font-weight:600;margin-top:6px\">Claude agent<\u002Fdiv><div style=\"font-size:10px;color:var(--tx2);margin-top:3px\">+ manual entry<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;color:var(--tx2)\">→<\u002Fdiv>\n        <div style=\"flex:1;min-width:118px;background:rgba(232,255,71,.07);border:1px solid rgba(232,255,71,.3);border-radius:10px;padding:12px;text-align:center\"><div style=\"font-size:18px\">🧑‍⚖️<\u002Fdiv><div style=\"font-size:11px;font-weight:600;margin-top:6px;color:var(--lime)\">YOU approve<\u002Fdiv><div style=\"font-size:10px;color:var(--tx2);margin-top:3px\">required gate<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;color:var(--tx2)\">→<\u002Fdiv>\n        <div style=\"flex:1;min-width:118px;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center\"><div style=\"font-size:18px\">🔀<\u002Fdiv><div style=\"font-size:11px;font-weight:600;margin-top:6px\">Asset router<\u002Fdiv><div style=\"font-size:10px;color:var(--tx2);margin-top:3px\">by class<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;color:var(--tx2)\">→<\u002Fdiv>\n        <div style=\"flex:1.4;min-width:150px;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center\"><div style=\"font-size:11px;font-weight:600;color:var(--pur)\">OANDA · forex<\u002Fdiv><div style=\"font-size:11px;font-weight:600;color:var(--blu);margin-top:4px\">Alpaca · stock + crypto<\u002Fdiv><div style=\"font-size:10px;color:var(--tx2);margin-top:4px\">poller → 📄 Sheet<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- cockpit relay connection -->\n    <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px\">\n        <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2)\">This cockpit ⇄ your router (Apps Script)<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ relayDot }}\"><\u002Fspan><span style=\"font-size:11px;color:var(--tx2)\">{{ relayStatusText }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px\">\n        <div><span style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:5px\">Router web-app URL<\u002Fspan><input type=\"text\" ref=\"{{ refRelayUrl }}\" placeholder=\"https://script.google.com/macros/s/.../exec\" style=\"width:100%;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:8px 10px;color:var(--tx);font-size:12px\"><\u002Fdiv>\n        <div><span style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:5px\">Shared secret<\u002Fspan><input type=\"text\" ref=\"{{ refRelaySecret }}\" placeholder=\"same string as in script\" style=\"width:100%;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:8px 10px;color:var(--tx);font-size:12px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <button onclick=\"{{ saveConf }}\" style=\"padding:8px 14px;border-radius:8px;border:none;background:var(--lime);color:#0a0b0d;font-size:12px;font-weight:700;cursor:pointer\">Save<\u002Fbutton>\n        <button onclick=\"{{ testRelay }}\" style=\"padding:8px 14px;border-radius:8px;border:1px solid var(--line2);background:transparent;color:var(--tx);font-size:12px;cursor:pointer\">{{ testLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"font-size:11px;color:var(--tx2);margin-top:10px;line-height:1.6\">Your OANDA + Alpaca keys live <b style=\"color:var(--tx)\">only in the Apps Script<\u002Fb> — never in this browser. On approval the cockpit posts the signal to the router; the router classifies the asset, places the paper order, and the poller writes P&amp;L to your Sheet.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- sub-tabs -->\n    <div style=\"display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap\">\n      <button onclick=\"{{ ctRouter }}\" style=\"{{ ctRouterStyle }}\">1 · Router + Sheet<\u002Fbutton>\n      <button onclick=\"{{ ctOanda }}\" style=\"{{ ctOandaStyle }}\">2 · OANDA Forex<\u002Fbutton>\n      <button onclick=\"{{ ctAlpaca }}\" style=\"{{ ctAlpacaStyle }}\">3 · Alpaca Stock + Crypto<\u002Fbutton>\n      <button onclick=\"{{ ctPoller }}\" style=\"{{ ctPollerStyle }}\">4 · P&amp;L Poller<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- 1 Router + Sheet -->\n    <div style=\"{{ connRouterS }}\">\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px\">\n        <div style=\"font-size:13px;color:var(--tx);line-height:1.7;margin-bottom:12px\">Create a Google Sheet → <b>Extensions ▸ Apps Script<\u002Fb> → paste this core. It receives your approved signals, classifies each ticker (forex / crypto / stock), dispatches to the right broker, and logs to a <b>Trades<\u002Fb> tab with your exact fields. <b>Deploy ▸ Web app<\u002Fb> (Execute as: me, Access: anyone) → paste the <span style=\"color:var(--lime)\">/exec<\u002Fspan> URL above. Add the OANDA, Alpaca, and Poller functions from the other tabs into the same project.<\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;margin-bottom:8px\"><button onclick=\"{{ copyRouter }}\" style=\"padding:5px 11px;border-radius:7px;border:1px solid var(--line2);background:transparent;color:var(--tx);font-size:11px;cursor:pointer\">{{ copyRouterLabel }}<\u002Fbutton><\u002Fdiv>\n        <pre style=\"background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:10.5px;color:var(--tx2);line-height:1.6;overflow-x:auto;margin:0;white-space:pre;max-height:460px\">{{ routerCode }}<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 2 OANDA -->\n    <div style=\"{{ connOandaS }}\">\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px\">\n        <div style=\"font-size:13px;color:var(--tx);line-height:1.7;margin-bottom:6px\">Sign up free at <b>oanda.com<\u002Fb> → open a <b>demo (practice)<\u002Fb> account → <b>Manage API Access<\u002Fb> → generate a token. Practice account ids start with <span style=\"color:var(--lime)\">101-<\u002Fspan>. Forex routes here as CFDs — <b>long and short allowed<\u002Fb>, sandbox leverage applies. Paste your token + account id into the router constants.<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:9px;background:rgba(232,255,71,.08);border:1px solid rgba(232,255,71,.25);border-radius:9px;padding:9px 13px;margin:12px 0;font-size:12px;color:var(--tx)\"><span>🔒<\u002Fspan><span><b>api-fxpractice.oanda.com<\u002Fb> only — the live host is never referenced.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;margin-bottom:8px\"><button onclick=\"{{ copyOanda }}\" style=\"padding:5px 11px;border-radius:7px;border:1px solid var(--line2);background:transparent;color:var(--tx);font-size:11px;cursor:pointer\">{{ copyOandaLabel }}<\u002Fbutton><\u002Fdiv>\n        <pre style=\"background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:10.5px;color:var(--grn);line-height:1.6;overflow-x:auto;margin:0;white-space:pre\">{{ oandaCode }}<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 3 Alpaca -->\n    <div style=\"{{ connAlpacaS }}\">\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px\">\n        <div style=\"font-size:13px;color:var(--tx);line-height:1.7;margin-bottom:6px\">Sign up free at <b>alpaca.markets<\u002Fb> → switch to <b>Paper Trading<\u002Fb> → generate paper API key + secret. Stocks route long or short under Alpaca's paper cash/margin rules. <b>Crypto is spot, long-only<\u002Fb> — the router rejects any crypto short before it can place.<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:9px;background:rgba(255,93,120,.08);border:1px solid rgba(255,93,120,.25);border-radius:9px;padding:9px 13px;margin:12px 0;font-size:12px;color:var(--tx)\"><span>⛔<\u002Fspan><span>Crypto guard: <b>no shorts, no margin, no leverage<\u002Fb>. A SELL on a crypto ticker never reaches the broker.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;margin-bottom:8px\"><button onclick=\"{{ copyAlpaca }}\" style=\"padding:5px 11px;border-radius:7px;border:1px solid var(--line2);background:transparent;color:var(--tx);font-size:11px;cursor:pointer\">{{ copyAlpacaLabel }}<\u002Fbutton><\u002Fdiv>\n        <pre style=\"background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:10.5px;color:var(--blu);line-height:1.6;overflow-x:auto;margin:0;white-space:pre\">{{ alpacaCode }}<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 4 Poller -->\n    <div style=\"{{ connPollerS }}\">\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px\">\n        <div style=\"font-size:13px;color:var(--tx);line-height:1.7;margin-bottom:6px\">No webhooks. In Apps Script open <b>Triggers ▸ Add trigger<\u002Fb> → function <span style=\"color:var(--lime)\">pollFills_<\u002Fspan> → <b>time-driven, every 5 minutes<\u002Fb>. It pulls closed trades from both paper accounts on the free tiers and writes <b>Realized P&amp;L<\u002Fb> back into the matching Order-ID row.<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:var(--tx2);line-height:1.8;margin:10px 0\">OANDA exposes <span style=\"color:var(--grn)\">realizedPL<\u002Fspan> on closed trades directly. Alpaca realized P&amp;L is derived from <span style=\"color:var(--blu)\">/v2/account/activities?activity_types=FILL<\u002Fspan> — the skeleton matches on order id; extend it to net entry vs exit fills for exact crypto/stock P&amp;L.<\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;margin-bottom:8px\"><button onclick=\"{{ copyPoller }}\" style=\"padding:5px 11px;border-radius:7px;border:1px solid var(--line2);background:transparent;color:var(--tx);font-size:11px;cursor:pointer\">{{ copyPollerLabel }}<\u002Fbutton><\u002Fdiv>\n        <pre style=\"background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:10.5px;color:var(--tx2);line-height:1.6;overflow-x:auto;margin:0;white-space:pre;max-height:420px\">{{ pollerCode }}<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ LAB ============ -->\n  <div style=\"{{ tabLabS }}\">\n    <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px\">\n      <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:12px\">Algorithm library<\u002Fspan>\n      <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px\">\n        <button onclick=\"{{ algoEma }}\" style=\"{{ algoEmaStyle }}\">EMA cross<\u002Fbutton>\n        <button onclick=\"{{ algoRsi }}\" style=\"{{ algoRsiStyle }}\">RSI filter<\u002Fbutton>\n        <button onclick=\"{{ algoMl }}\" style=\"{{ algoMlStyle }}\">ML signal<\u002Fbutton>\n        <button onclick=\"{{ algoBb }}\" style=\"{{ algoBbStyle }}\">Bollinger R<\u002Fbutton>\n        <button onclick=\"{{ algoWalk }}\" style=\"{{ algoWalkStyle }}\">Walk-forward<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:var(--tx2);line-height:1.6;margin-bottom:12px\">{{ algoDesc }}<\u002Fdiv>\n      <pre style=\"background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:11px;color:var(--grn);line-height:1.7;overflow-x:auto;margin:0;white-space:pre\">{{ algoCode }}<\u002Fpre>\n    <\u002Fdiv>\n    <div style=\"background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px\">\n      <span style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);display:block;margin-bottom:12px\">Build order<\u002Fspan>\n      <div style=\"font-size:12.5px;line-height:2;color:var(--tx2)\">\n        <div><b style=\"color:var(--tx)\">Week 1 — Router + Sheet:<\u002Fb> deploy the Apps Script web app, paste the URL above, Test connection.<\u002Fdiv>\n        <div><b style=\"color:var(--tx)\">Week 2 — Brokers:<\u002Fb> add OANDA demo + Alpaca paper keys to the script; approve a forex + a crypto signal, confirm orders land.<\u002Fdiv>\n        <div><b style=\"color:var(--tx)\">Week 3 — Poller:<\u002Fb> add the 5-min trigger; watch Realized P&amp;L populate as paper trades close.<\u002Fdiv>\n        <div><b style=\"color:var(--tx)\">Week 4 — Python env:<\u002Fb> <span style=\"color:var(--grn)\">pip install pandas alpaca-py oandapyV20 pandas-ta<\u002Fspan> to backtest the algos at left.<\u002Fdiv>\n        <div><b style=\"color:var(--tx)\">Month 2 — Walk-forward:<\u002Fb> test on your own exported CSV before any edge gates a route.<\u002Fdiv>\n        <div><b style=\"color:var(--tx)\">Month 4 — ML filter:<\u002Fb> logistic regression on 50+ closed trades, AUC &gt; 0.6 before it gates anything.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    tab:'money', loc:'latam', inc:1500, ret:3, inj:500,\n    trades:[], executed:[], pending:[], ns:0,\n    sent:null, sentHist:[],\n    rrPrev:'', rrPrevOk:null,\n    genBusy:false, testBusy:false, sentBusy:false,\n    algo:'ema', connTab:'router',\n    relayUrl:'', relaySecret:'', relayStatus:'offline', copied:null\n  };\n\n  refDate=React.createRef(); refPair=React.createRef(); refDir=React.createRef();\n  refEntry=React.createRef(); refSl=React.createRef(); refTp=React.createRef();\n  refResult=React.createRef(); refNotes=React.createRef();\n  refSAsset=React.createRef(); refSCtx=React.createRef();\n  refRelayUrl=React.createRef(); refRelaySecret=React.createRef();\n\n  LOC={\n    latam:{name:'LATAM (Medellín)',items:[['Rent (1BR)',600],['Food & dining',300],['Transport',70],['Internet + cowork',90],['Health (SafetyWing)',65],['Phone',20],['Entertainment',120],['Buffer',100]]},\n    bcn:{name:'Barcelona, Spain',items:[['Rent (1BR Gràcia)',1350],['Food & dining',500],['Transport',100],['Internet',40],['Health (private)',160],['Phone',20],['Entertainment',220],['Buffer',140]]},\n    usa:{name:'USA (Austin TX)',items:[['Rent (1BR)',1700],['Food & dining',600],['Transport',580],['Internet',70],['Health insurance',420],['Phone',70],['Entertainment',250],['Buffer',180]]}\n  };\n  OH=[['Spread/commission (20 trades)',250],['Swap fees',80],['Data (free tier)',0],['VPS',20]];\n  ALGOS={\n    ema:{d:'Core entry filter. EMA 20 crosses above EMA 50 = trend up. Only take LONG setups in that state. Add RSI > 50 confirmation before entering.',c:\"import pandas as pd\\nimport yfinance as yf\\n\\ndef ema_signals(ticker='EURUSD=X', fast=20, slow=50):\\n    df = yf.download(ticker, period='6mo', interval='1h')\\n    df['EMA_f'] = df['Close'].ewm(span=fast, adjust=False).mean()\\n    df['EMA_s'] = df['Close'].ewm(span=slow, adjust=False).mean()\\n    df['cross'] = (df['EMA_f'] > df['EMA_s']).astype(int).diff()\\n    entries = df[df['cross'] != 0].copy()\\n    entries['signal'] = entries['cross'].map({1:'LONG', -1:'SHORT'})\\n    return entries[['Close','EMA_f','EMA_s','signal']]\"},\n    rsi:{d:'Momentum filter. Do NOT enter a LONG even with EMA trend up if RSI < 50. Wait for RSI to cross 50 upward — that crossing is the confirmation, not just being above 50.',c:\"import pandas_ta as ta\\n\\ndef add_rsi_filter(df, period=14):\\n    df['RSI'] = ta.rsi(df['Close'], length=period)\\n    df['rsi_up'] = (df['RSI'] > 50) & (df['RSI'].shift(1) <= 50)\\n    df['valid_long'] = (df['EMA_f'] > df['EMA_s']) & df['rsi_up']\\n    return df\\n\\n# pip install pandas-ta\"},\n    ml:{d:'Logistic regression on your own trade log. Once you have 50+ closed trades, train this to learn which conditions predict wins. Require AUC > 0.6 before trusting it.',c:\"import pandas as pd\\nfrom sklearn.linear_model import LogisticRegression\\nfrom sklearn.model_selection import cross_val_score\\nfrom sklearn.preprocessing import StandardScaler\\n\\ndf = pd.read_csv('trades.csv')\\ndf['won'] = (df['Result'] == 'WIN').astype(int)\\ndf['rr_val'] = df['RR'].str.replace(':1','').astype(float)\\ndf['is_long'] = (df['Direction'] == 'LONG').astype(int)\\n\\nfeatures = ['rr_val', 'is_long']  # add hour, dow, ema_spread, rsi...\\nX = df[features].dropna()\\ny = df.loc[X.index, 'won']\\n\\nX_s = StandardScaler().fit_transform(X)\\nauc = cross_val_score(LogisticRegression(), X_s, y, cv=5, scoring='roc_auc')\\nprint(f'AUC: {auc.mean():.3f} +/- {auc.std():.3f}')\"},\n    bb:{d:'Bollinger Band squeeze breakout in R. The squeeze (bands narrowing) signals volatility compression before expansion. Enter when price breaks the band after a squeeze.',c:'library(quantmod); library(TTR)\\n\\ngetSymbols(\"EURUSD=X\", src=\"yahoo\")\\nprice <- Cl(`EURUSD=X`)\\n\\nbb <- BBands(price, n=20, sd=2)\\nbw <- bb[,\"up\"] - bb[,\"dn\"]\\n\\n# Squeeze: bandwidth below its 20-period average\\nsqueeze <- bw < rollapply(bw, 20, mean, na.rm=TRUE)\\n\\n# Breakout LONG after squeeze\\nbreakout_long <- lag(squeeze,1) & price > bb[,\"up\"]\\n\\ntail(merge(price, bb, squeeze, breakout_long), 10)'},\n    walk:{d:'Walk-forward testing prevents lookahead bias — the #1 beginner mistake. Train on 3 months, test on 1, slide forward. Never optimize and test on the same data.',c:\"import pandas as pd\\nimport yfinance as yf\\n\\ndef walk_forward(ticker, strat, train_mo=3, test_mo=1):\\n    df = yf.download(ticker, period='2y', interval='1h')\\n    results, start = [], 0\\n    train_bars = train_mo * 22 * 8\\n    test_bars  = test_mo  * 22 * 8\\n    while start + train_bars + test_bars < len(df):\\n        train = df.iloc[start : start+train_bars]\\n        test  = df.iloc[start+train_bars : start+train_bars+test_bars]\\n        best  = strat.optimize(train)        # optimize on train\\n        results.append(strat.evaluate(test, best))  # OOS test\\n        start += test_bars                    # slide forward\\n    return pd.DataFrame(results)\\n\\n# Track: win_rate, avg_rr, expectancy, max_drawdown\"}\n  };\n\n  // ---- Apps Script code blocks (strings; avoids {{ }} collisions) ----\n  routerCode = [\n'// === PAPER TRADE ROUTER — Google Apps Script Web App ===',\n'// No TradingView, no webhooks. Your cockpit POSTs an APPROVED signal here;',\n'// this classifies the asset, routes to the right *paper* broker, logs to',\n'// the Sheet. A separate 5-min poller fills in Realized P&L (Poller tab).',\n'',\n'const SECRET     = \"CHANGE_ME_long_random_string\";',\n'const PAPER_ONLY = true;                       // hard lock — leave true',\n'',\n'// ---- OANDA v20 (forex, demo) ----',\n'const OANDA_TOKEN   = \"YOUR_OANDA_PRACTICE_TOKEN\";',\n'const OANDA_ACCOUNT = \"101-XXX-XXXXXXX-XXX\";   // 101- = practice',\n'const OANDA_HOST    = \"https://api-fxpractice.oanda.com\";   // practice ONLY',\n'',\n'// ---- Alpaca (stocks + crypto, paper) ----',\n'const ALPACA_KEY    = \"YOUR_ALPACA_PAPER_KEY\";',\n'const ALPACA_SECRET = \"YOUR_ALPACA_PAPER_SECRET\";',\n'const ALPACA_HOST   = \"https://paper-api.alpaca.markets\";   // paper ONLY',\n'',\n'// Classify a ticker -> forex | crypto | stock',\n'function assetClass_(t){',\n'  t = String(t||\"\").toUpperCase().replace(\"/\",\"\");',\n'  if(/^(BTC|ETH|SOL|LTC|DOGE|AVAX|LINK|ADA|XRP|DOT|MATIC)/.test(t)) return \"crypto\";',\n'  const fx = [\"EUR\",\"GBP\",\"USD\",\"JPY\",\"AUD\",\"NZD\",\"CAD\",\"CHF\"];',\n'  if(t.length===6 && fx.indexOf(t.slice(0,3))>=0 && fx.indexOf(t.slice(3))>=0) return \"forex\";',\n'  return \"stock\";',\n'}',\n'',\n'function doPost(e){',\n'  const b = JSON.parse(e.postData.contents || \"{}\");',\n'  if(b.secret !== SECRET) return json_({error:\"bad secret\"});',\n'  if(!PAPER_ONLY)         return json_({error:\"paper lock disabled — refusing\"});',\n'  if(b.action === \"execute\") return json_(routeOrder_(b.signal || {}));',\n'  return json_({ok:true, paper_only:true});',\n'}',\n'',\n'function doGet(e){   // cockpit \"Test connection\" ping',\n'  if(e.parameter.secret !== SECRET) return json_({error:\"bad secret\"});',\n'  return json_({ok:true, paper_only:PAPER_ONLY,',\n'    brokers:[\"oanda-fxpractice\",\"alpaca-paper\"]});',\n'}',\n'',\n'function routeOrder_(s){',\n'  const cls  = assetClass_(s.pair || s.ticker);',\n'  const side = String(s.direction||\"\").toUpperCase()===\"SHORT\" ? \"SELL\" : \"BUY\";',\n'  if(cls === \"crypto\" && side === \"SELL\")          // spot, long-only',\n'    return {error:\"crypto is spot long-only — short rejected\"};',\n'  const res = (cls === \"forex\") ? placeOanda_(s, side)',\n'                                : placeAlpaca_(s, side, cls);',\n'  logOrder_(cls, s, side, res);',\n'  return {ok:!res.error, asset:cls, order:res};',\n'}',\n'',\n'function logOrder_(cls, s, side, res){',\n'  sheet_().appendRow([ new Date(), cls, (s.pair||s.ticker), side,',\n'    res.price||\"\", res.qty||\"\", res.id||res.error||\"\", \"\" ]);  // P&L set on close',\n'}',\n'',\n'function sheet_(){',\n'  const ss = SpreadsheetApp.getActiveSpreadsheet();',\n'  let sh = ss.getSheetByName(\"Trades\");',\n'  if(!sh){ sh = ss.insertSheet(\"Trades\");',\n'    sh.appendRow([\"Timestamp\",\"Asset Class\",\"Ticker\",\"Side\",',\n'      \"Execution Price\",\"Quantity\",\"Order ID\",\"Realized P&L\"]); }',\n'  return sh;',\n'}',\n'',\n'function json_(o){ return ContentService.createTextOutput(JSON.stringify(o))',\n'  .setMimeType(ContentService.MimeType.JSON); }'\n  ].join('\\n');\n\n  oandaCode = [\n'// FOREX -> OANDA v20 demo · CFD · long + short · sandbox leverage',\n'function placeOanda_(s, side){',\n'  const units = (side === \"BUY\" ? 1 : -1) * (s.units || 1000);   // CFD size',\n'  const order = { order: {',\n'    type:\"MARKET\",',\n'    instrument: String(s.pair).toUpperCase().replace(\"/\",\"_\"),   // EUR_USD',\n'    units: String(units), timeInForce:\"FOK\", positionFill:\"DEFAULT\",',\n'    stopLossOnFill:   s.sl ? {price:String(s.sl)} : undefined,',\n'    takeProfitOnFill: s.tp ? {price:String(s.tp)} : undefined }};',\n'  const r = UrlFetchApp.fetch(',\n'    OANDA_HOST + \"/v3/accounts/\" + OANDA_ACCOUNT + \"/orders\", {',\n'      method:\"post\", contentType:\"application/json\",',\n'      headers:{ Authorization:\"Bearer \" + OANDA_TOKEN },',\n'      payload: JSON.stringify(order), muteHttpExceptions:true });',\n'  const d = JSON.parse(r.getContentText());',\n'  const f = d.orderFillTransaction || {};',\n'  return { id: f.id || (d.orderCreateTransaction||{}).id || \"oanda_err\",',\n'           price: f.price || \"\", qty: f.units || units };',\n'}'\n  ].join('\\n');\n\n  alpacaCode = [\n'// STOCKS + CRYPTO -> Alpaca Paper',\n'// crypto: spot, long-only, no margin/leverage  |  stock: long or short',\n'function placeAlpaca_(s, side, cls){',\n'  let symbol = String(s.ticker || s.pair).toUpperCase();',\n'  if(cls === \"crypto\"){',\n'    if(side === \"SELL\") return {error:\"crypto long-only\"};   // hard guard',\n'    symbol = symbol.replace(\"USD\",\"/USD\");                   // BTC -> BTC/USD',\n'  }',\n'  const order = {',\n'    symbol: symbol,',\n'    qty: String(s.qty || (cls === \"crypto\" ? 0.01 : 1)),',\n'    side: side.toLowerCase(),                                // buy / sell',\n'    type: \"market\",',\n'    time_in_force: (cls === \"crypto\" ? \"gtc\" : \"day\")',\n'  };',\n'  const r = UrlFetchApp.fetch(ALPACA_HOST + \"/v2/orders\", {',\n'    method:\"post\", contentType:\"application/json\",',\n'    headers:{ \"APCA-API-KEY-ID\":ALPACA_KEY,',\n'              \"APCA-API-SECRET-KEY\":ALPACA_SECRET },',\n'    payload: JSON.stringify(order), muteHttpExceptions:true });',\n'  const d = JSON.parse(r.getContentText());',\n'  return { id: d.id || (d.message ? \"alpaca_err\" : \"sent\"),',\n'           price: d.filled_avg_price || \"\", qty: d.qty || order.qty };',\n'}'\n  ].join('\\n');\n\n  pollerCode = [\n'// FILL / P&L POLLER — no webhooks, free data only.',\n'// Triggers ▸ Add trigger ▸ pollFills_ ▸ time-driven ▸ every 5 minutes.',\n'function pollFills_(){',\n'  const sh = sheet_();',\n'  const rows = sh.getDataRange().getValues();        // incl. header',\n'  const pnl = {};                                    // orderId -> realized P&L',\n'',\n'  // OANDA: closed trades carry realizedPL directly',\n'  const o = api_(OANDA_HOST + \"/v3/accounts/\" + OANDA_ACCOUNT +',\n'    \"/trades?state=CLOSED&count=200\",',\n'    { Authorization:\"Bearer \" + OANDA_TOKEN });',\n'  (o.trades || []).forEach(function(t){',\n'    if(t.id) pnl[t.id] = t.realizedPL;',\n'  });',\n'',\n'  // Alpaca: net realized P&L from FILL activities, keyed by order id',\n'  const a = api_(ALPACA_HOST + \"/v2/account/activities?activity_types=FILL\",',\n'    { \"APCA-API-KEY-ID\":ALPACA_KEY, \"APCA-API-SECRET-KEY\":ALPACA_SECRET });',\n'  (Array.isArray(a) ? a : []).forEach(function(f){',\n'    const id = f.order_id; if(!id) return;',\n'    const signed = (f.side === \"sell\" ? 1 : -1) * f.price * f.qty;',\n'    pnl[id] = (pnl[id] || 0) + signed;   // net entry vs exit fills',\n'  });',\n'',\n'  for(let i=1;i<rows.length;i++){',\n'    const id = rows[i][6];                           // Order ID col',\n'    if(id && pnl[id] != null && rows[i][7] === \"\"){   // Realized P&L empty',\n'      sh.getRange(i+1, 8).setValue(pnl[id]);',\n'    }',\n'  }',\n'}',\n'',\n'function api_(url, headers){',\n'  const r = UrlFetchApp.fetch(url, {headers:headers, muteHttpExceptions:true});',\n'  try{ return JSON.parse(r.getContentText()); }catch(e){ return {}; }',\n'}'\n  ].join('\\n');\n\n  // ---- persistence ----\n  save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }\n  load(k,d){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):d; }catch(e){ return d; } }\n\n  componentDidMount(){\n    const conf = this.load('pta_conf', {});\n    this.setState({\n      trades: this.load('pta_trades', []),\n      executed: this.load('pta_exec', []),\n      sentHist: this.load('pta_senthist', []),\n      ns: this.load('pta_ns', 0),\n      inc: this.load('pta_inc', 1500), ret: this.load('pta_ret', 3), inj: this.load('pta_inj', 500),\n      loc: this.load('pta_loc', 'latam'),\n      relayUrl: conf.url || '', relaySecret: conf.secret || '', relayStatus: conf.url ? 'idle' : 'offline'\n    }, () => {\n      if(this.refRelayUrl.current) this.refRelayUrl.current.value = this.state.relayUrl;\n      if(this.refRelaySecret.current) this.refRelaySecret.current.value = this.state.relaySecret;\n      if(this.refDate.current) this.refDate.current.value = new Date().toISOString().slice(0,10);\n    });\n  }\n\n  setTab=(t)=>this.setState({tab:t});\n\n  // ---- money ----\n  setSlider=(key,e)=>{ const v=parseFloat(e.target.value); this.setState({[key]:v}); this.save('pta_'+key, v); };\n  setLoc=(l)=>{ this.setState({loc:l}); this.save('pta_loc', l); };\n  money(){\n    const {inc,ret,inj,loc}=this.state;\n    const L=this.LOC[loc];\n    const living=L.items.reduce((a,b)=>a+b[1],0);\n    const oh=this.OH.reduce((a,b)=>a+b[1],0);\n    const gross=Math.round((living+oh)/0.75);\n    const acct=Math.round(gross/(ret/100));\n    const monthsTo=(target)=>{let b=5000,m=0;while(b<target&&m<600){b=b*(1+ret/100)+inj;m++;}return m<600?m:null;};\n    const latamAc
